name: 🚀 배포

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PRD_DB_HOST: ${{ secrets.PRD_DB_HOST }}
      PRD_DB_USERNAME: ${{ secrets.PRD_DB_USERNAME }}
      PRD_DB_PASSWORD: ${{ secrets.PRD_DB_PASSWORD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      AES_KEY: ${{ secrets.AES_KEY }}
      PRD_MONGO_DB_URL: ${{ secrets.PRD_MONGO_DB_URL }}
      NAMESPACE_NAME: ${{ secrets.NAMESPACE_NAME }}
      USER_BUCKET_NAME_DEV: ${{ secrets.USER_BUCKET_NAME_DEV }}
      CHALLENGE_BUCKET_NAME_DEV: ${{ secrets.CHALLENGE_BUCKET_NAME_DEV }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: 🔨 JDK 17 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 gradlew 실행 권한 설정
        run: chmod +x gradlew

      - name: 🔨 Gradle 캐시 설정
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Gradle 빌드
        run: ./gradlew build --parallel

      - name: 📦 jar, appspec, 배포 스크립트 복사
        run: |
          mkdir -p before-deploy
          cp ./build/libs/*.jar ./before-deploy/
          cp ./appspec.yml ./before-deploy/
          cp -r ./scripts/dev/ ./before-deploy/scripts/

      - name: 🗜️ 배포 패키지 생성
        run: zip -r -qq ./deploy.zip ./before-deploy/

      - name: 🔑 SSH 키 설정
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PRD_SSH_KEY }}

      - name: 🔑 Ubuntu 호스트 추가
        run: |
          ssh-keyscan -H ${{ secrets.PRD_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: 🚀 서버에 파일 업로드
        run: |
          scp ./deploy.zip ubuntu@${{ secrets.PRD_SERVER_IP }}:/home/ubuntu/deploy.zip
          ssh ubuntu@${{ secrets.PRD_SERVER_IP }} "
            unzip -o /home/ubuntu/deploy.zip -d /home/ubuntu &&
            rm -rf /home/ubuntu/app/* &&
            mv /home/ubuntu/before-deploy/* /home/ubuntu/app/ &&
            chmod +x /home/ubuntu/app/scripts/*.sh"

      - name: 🎯 Ubuntu 서버에서 배포 실행
        run: |
          ssh ubuntu@${{ secrets.PRD_SERVER_IP }} "/home/ubuntu/app/scripts/run_new_was.sh"

      - name: 🎯 Ubuntu 서버에서 Health Checking
        run: |
          ssh ubuntu@${{ secrets.PRD_SERVER_IP }} "/home/ubuntu/app/scripts/health.sh"

      - name: 🎯 Ubuntu 서버에서 Blue/Green Switching
        run: |
          ssh ubuntu@${{ secrets.PRD_SERVER_IP }} "/home/ubuntu/app/scripts/switch.sh"

      - name: 🧹 임시 파일 정리
        run: |
          ssh ubuntu@${{ secrets.PRD_SERVER_IP }} "
            rm -rf /home/ubuntu/deploy.zip /home/ubuntu/before-deploy"
