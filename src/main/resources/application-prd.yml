spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/addiction?useSSL=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQL8Dialect
        #        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          exception-handling: ignore
  data:
    mongodb:
      uri: ${MONGO_DB_URL}
      database: addiction
    logging:
      level:
        p6spy: info

      decorator:
        datasource:
          p6spy:
            enable-logging: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: addiction1215@gmail.com
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

oauth:
  kakao:
    api:
      url: https://kapi.kakao.com
      name: kakaoApi
  google:
    api:
      url: https://www.googleapis.com
      name: googleApi
  naver:
    api:
      url: https://openapi.naver.com
      name: naverApi

jwt:
  secret-key: ${JWT_SECRET_KEY}

slack:
  webhook:
    url: ${SLACK_WEBHOOK}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: addiction-prd

logging:
  config: classpath:logback/logback-config.xml

aws:
  access-key: ${AWS_ACCESS_KEY}  # AWS IAM Access Key
  secret-key: ${AWS_SECRET_KEY}  # AWS IAM Secret Key
  s3:
    region: ap-northeast-2  # Seoul Region
    bucket:
      user: quitmate-user-prd
      challenge: quitmate-challenge-prd
      challenge-badge: quitmate-challenge-badge-prd
      inquiry: quitmate-inquiry-prd
